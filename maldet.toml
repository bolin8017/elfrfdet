[detector]
name = "elfrfdet"
version = "4.2.0"
framework = "sklearn"
description = "Random Forest ELF malware detector — reference template for the lolday platform on the maldet 2.2 framework"

[input]
binary_format = "elf"
required_sections = [".text"]
dataset_contract = "sample_csv"

[output]
task = "binary_classification"
classes = ["Benign", "Malware"]
positive_class = "Malware"
score_range = [0.0, 1.0]

[resources]
supports = ["cpu"]
recommended = "cpu"
min_memory_gib = 2
gpu_required = false

[lifecycle]
stages = ["train", "evaluate", "predict"]
supports_serving = false
supports_hpsweep = true
supports_distributed = false
supports_multinode = false

[artifacts]
model = { path = "model/", type = "dir" }
metrics = { path = "metrics.json", type = "file" }
predictions = { path = "predictions.csv", type = "file" }

[compat]
min_python = "3.12"
min_maldet = "2.2"
schema_version = 2

[stages.train]
reader = "maldet.builtins.readers:SampleCsvReader"
extractor = "elfrfdet.features:Text256Extractor"
model = "elfrfdet.models:make_rf"
trainer = "maldet.trainers.sklearn_trainer:SklearnTrainer"
evaluator = "maldet.evaluators.binary:BinaryClassification"
config_class = "elfrfdet.configs:TrainConfig"
params_schema = {}  # placeholder; populated by maldet build

[stages.evaluate]
reader = "maldet.builtins.readers:SampleCsvReader"
extractor = "elfrfdet.features:Text256Extractor"
evaluator = "maldet.evaluators.binary:BinaryClassification"
config_class = "elfrfdet.configs:EvaluateConfig"
params_schema = {}  # placeholder; populated by maldet build

[stages.predict]
reader = "maldet.builtins.readers:SampleCsvReader"
extractor = "elfrfdet.features:Text256Extractor"
predictor = "maldet.builtins.predictors:BatchPredictor"
config_class = "elfrfdet.configs:PredictConfig"
params_schema = {}  # placeholder; populated by maldet build
